<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Ac 2 Linguagem de Programação
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">


  <div id="container"></div>

   <ion-alert
trigger="ver-linguagem"
header="valor do motorita e do aplicativo {{vMotorista}} {{vAplicativo}}"
message={{linguagemEscolhida}}
[buttons]="alertButtons"
></ion-alert>

 <ion-radio-group value="aplicativo" [(ngModel)]="aplicativo">
  <ion-radio value="normal">Normal </ion-radio><br />
  <ion-radio value="superior">Superior</ion-radio><br />
  <ion-radio value="vip">VIP</ion-radio><br />
</ion-radio-group>


 <ion-input label="km rodados" labelPlacement="floating"
    placeholder="Digite a quantidade de quilometros rodados" type="number"
  [(ngModel)]="quilometro"></ion-input>

  <ion-button expand="block" id="ver-linguagem"
(click)="calcular()">calcular</ion-button>

<ion-label><br>Valor da corrida: R${{valorFinal}} </ion-label>



    <ion-radio-group value="start" [(ngModel)]="combustivel">
    <ion-radio value="etanol">Etanol</ion-radio><br />
    <ion-radio value="gasolina">Gasolina</ion-radio><br />
    <ion-radio value="diesel">Diesel</ion-radio>
    </ion-radio-group>

    <ion-input label="Preço Atual do Combustível em Reais" labelPlacement="floating"
    placeholder="Digite apenas números" type="number" [(ngModel)]="preco"></ion-input>

    <ion-input label="Quantidade de Km Rodados" labelPlacement="floating"
    placeholder="Digite apenas números" type="number" [(ngModel)]="km"></ion-input>

  <ion-alert
  trigger="calcular"
  header="valor a ser pago {{valorPago}}"
  message={{linguagemEscolhida}}
  [buttons]="alertButtons"
  ></ion-alert>

    <ion-button expand="block" id="calcular" (click)="calcular()">calcular</ion-button>

</ion-content>
